<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>n40y - Writeups CTF</title>

  <!-- Bibliothèques externes -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link id="highlight-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="style/style.css">

  <style>
    body {
      background-image: url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1920&auto=format&fit=crop');
      background-size: cover;
      background-attachment: fixed;
      overflow-x: hidden;
    }
    body.dark-mode::before {
      content: ""; position: fixed; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.65), rgba(2,6,12,0.85));
      z-index: -2;
    }
    body.light-mode::before {
      content: ""; position: fixed; inset: 0;
      background: linear-gradient(180deg, rgba(232,236,239,0.2), rgba(245,247,250,0.4));
      z-index: -2;
    }
    main {
      position: relative; z-index: 2; max-width: 1100px; margin: 0 auto;
      background: rgba(10, 10, 15, 0.3);
      backdrop-filter: blur(10px); padding: 20px; border-radius: 12px;
    }

    /* --- STRUCTURE DE L'ARTICLE (FIX CHEVAUCHEMENT) --- */
    .writeup-item {
      margin: 15px 0;
      padding: 0; /* On gère le padding à l'intérieur */
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      overflow: hidden; /* Empêche tout débordement sur le voisin */
      position: relative;
    }

    .clickable {
      cursor: pointer; display: flex; align-items: center; justify-content: space-between;
      padding: 15px 20px; user-select: none; position: relative;
      background: rgba(255,255,255,0.02);
      z-index: 5;
    }
    .clickable:hover { background: rgba(110,240,211,0.05); }

    /* CONTENEUR DE TRANSITION */
    .writeup-content {
      height: 0;
      overflow: hidden;
      transition: height 0.4s ease-in-out;
      background: rgba(0,0,0,0.2);
    }

    /* WRAPPER INTERNE (POUR LE CALCUL) */
    .writeup-inner {
      padding: 20px;
      border-top: 1px solid rgba(110,240,211,0.1);
      box-sizing: border-box;
    }

    /* ÉTAT OUVERT : On ne force plus le height:auto via CSS, on le laisse au JS */
    .writeup-content.open {
      border-bottom: 1px solid rgba(110,240,211,0.1);
    }

    /* --- ÉLÉMENTS GRAPHIQUES --- */
    .clickable .title-text { color: #6ef0d3; font-weight: 600; font-size: 1.1rem; }
    .clickable::after {
      content: '+'; font-size: 1.4rem; color: #6ef0d3;
      transition: transform 0.3s;
    }
    .clickable.open::after { content: '−'; transform: rotate(180deg); }

    .diff-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; margin-left: 10px; }
    .diff-easy   { background: rgba(57,224,110,.15); color: #39e06e; border: 1px solid #39e06e55; }
    .diff-medium { background: rgba(224,176,57,.15); color: #e0b039; border: 1px solid #e0b03955; }
    .diff-hard   { background: rgba(224,99,57,.15);  color: #e06339; border: 1px solid #e0633955; }

    /* MARKDOWN STYLING */
    .writeup-inner img { max-width: 100%; border-radius: 8px; margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); }
    .writeup-inner pre { background: #0d1117 !important; padding: 16px; border-radius: 8px; overflow-x: auto; border: 1px solid #30363d; }
    .writeup-inner code { font-family: 'Fira Code', monospace; font-size: 0.9em; }
    .writeup-inner h1, .writeup-inner h2 { color: #b16bff; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }

    .theme-toggle {
      position: fixed; right: 20px; top: 20px; padding: 10px; border-radius: 50%; border: 0; cursor: pointer;
      background: #1e90ff; color: #fff; z-index: 1000; width: 45px; height: 45px;
    }
    .filters { display: flex; gap: 10px; margin-bottom: 25px; }
    .filter-btn {
      padding: 8px 18px; border-radius: 20px; border: 1px solid #6ef0d344;
      background: transparent; color: #6ef0d3aa; cursor: pointer;
    }
    .filter-btn.active { background: #6ef0d322; color: #6ef0d3; border-color: #6ef0d3; }
  </style>
</head>

<body class="dark-mode">
  <button id="theme-toggle" class="theme-toggle">☀️</button>

  <main>
    <header>
      <h1>📂 Writeups CTF</h1>
      <p>Mes solutions détaillées par plateforme</p>
    </header>

    <div class="filters" id="filters">
      <button class="filter-btn active" data-platform="all">Tous</button>
    </div>

    <div id="writeupList"></div>

    <p style="margin-top:30px">
      <a href="index.html" style="color:#6ef0d3; font-weight:700; text-decoration:none">⬅ Retour au portfolio</a>
    </p>
  </main>

  <script>
    // Config Markdown
    marked.setOptions({
      highlight: (code, lang) => {
        if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
        return hljs.highlightAuto(code).value;
      },
      breaks: true
    });

    // Accordéon avec calcul dynamique de hauteur (Fix Chevauchement)
    async function loadAndToggle(h3, contentDiv, entry) {
      const isOpen = contentDiv.classList.contains('open');

      // Fermer les autres (optionnel, pour la propreté)
      document.querySelectorAll('.writeup-content.open').forEach(other => {
        if (other !== contentDiv) {
          other.style.height = '0px';
          other.classList.remove('open');
          other.parentElement.querySelector('.clickable').classList.remove('open');
        }
      });

      if (isOpen) {
        contentDiv.style.height = '0px';
        contentDiv.classList.remove('open');
        h3.classList.remove('open');
      } else {
        if (!contentDiv.dataset.loaded) {
          contentDiv.innerHTML = '<div class="writeup-inner">Chargement...</div>';
          contentDiv.classList.add('open');
          contentDiv.style.height = 'auto'; // Temporaire pour le chargement

          try {
            const res = await fetch(entry.file);
            const md = await res.text();
            contentDiv.innerHTML = `<div class="writeup-inner">${marked.parse(md)}</div>`;
            contentDiv.dataset.loaded = "true";
            
            contentDiv.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
            
            // Attente des images pour le calcul final
            const imgs = contentDiv.querySelectorAll('img');
            await Promise.all(Array.from(imgs).map(img => {
              if (img.complete) return Promise.resolve();
              return new Promise(r => { img.onload = r; img.onerror = r; });
            }));
          } catch {
            contentDiv.innerHTML = '<div class="writeup-inner">Erreur de chargement.</div>';
          }
        }

        h3.classList.add('open');
        contentDiv.classList.add('open');

        // CALCUL DE LA HAUTEUR REELLE
        const inner = contentDiv.querySelector('.writeup-inner');
        const height = inner.getBoundingClientRect().height;
        contentDiv.style.height = height + 'px';

        // Fix final : On laisse en pixels pour forcer le parent à s'étendre
        // sans utiliser height:auto qui casse parfois les transitions
      }
    }

    // Chargement du JSON et création du DOM
    async function buildPage() {
      const list = document.getElementById('writeupList');
      const filters = document.getElementById('filters');

      try {
        const res = await fetch('writeups/writeups.json');
        const manifest = await res.json();
        const platforms = [...new Set(manifest.map(e => e.platform))];

        platforms.forEach(p => {
          const btn = document.createElement('button');
          btn.className = 'filter-btn';
          btn.dataset.platform = p;
          btn.textContent = p;
          filters.appendChild(btn);
        });

        filters.addEventListener('click', (e) => {
          if (!e.target.classList.contains('filter-btn')) return;
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          const p = e.target.dataset.platform;
          document.querySelectorAll('.platform-section').forEach(s => {
            s.style.display = (p === 'all' || s.dataset.platform === p) ? '' : 'none';
          });
        });

        const grouped = manifest.reduce((acc, obj) => {
          acc[obj.platform] = acc[obj.platform] || [];
          acc[obj.platform].push(obj);
          return acc;
        }, {});

        for (const [plat, entries] of Object.entries(grouped)) {
          const sec = document.createElement('section');
          sec.className = 'platform-section';
          sec.dataset.platform = plat;
          sec.innerHTML = `<h2 style="color:#b16bff; margin-top:30px;">${plat}</h2>`;

          entries.forEach(entry => {
            const art = document.createElement('article');
            art.className = 'writeup-item';
            art.innerHTML = `
              <div class="clickable">
                <span>
                  <span class="title-text">${entry.title}</span>
                  <span class="diff-badge diff-${entry.difficulty.toLowerCase()}">${entry.difficulty}</span>
                </span>
                <span style="font-size:0.8rem; opacity:0.5; margin-right:40px;">${entry.date}</span>
              </div>
              <div class="writeup-content"></div>
            `;
            
            const btn = art.querySelector('.clickable');
            const cont = art.querySelector('.writeup-content');
            btn.onclick = () => loadAndToggle(btn, cont, entry);
            sec.appendChild(art);
          });
          list.appendChild(sec);
        }
      } catch (e) {
        list.innerHTML = "Erreur de chargement du catalogue.";
      }
    }

    buildPage();

    // Thème simple
    document.getElementById('theme-toggle').onclick = () => {
      document.body.classList.toggle('light-mode');
      document.body.classList.toggle('dark-mode');
    };
  </script>
</body>
</html>
